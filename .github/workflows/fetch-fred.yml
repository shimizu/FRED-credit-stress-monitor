name: Fetch FRED Data

on:
  schedule:
    # 毎日UTC 22:00（米国市場クローズ後）に実行
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch FRED data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const API_KEY = process.env.FRED_API_KEY;
          if (!API_KEY) {
            console.error('FRED_API_KEY が設定されていません');
            process.exit(1);
          }

          const SERIES = {
            HY:   'BAMLH0A0HYM2',
            BB:   'BAMLH0A1HYBB',
            B:    'BAMLH0A2HYB',
            CCC:  'BAMLH0A3HYC',
            EMHY: 'BAMLEMHBHYCRPIOAS'
          };

          async function fetchSeries(seriesId) {
            const url = `https://api.stlouisfed.org/fred/series/observations?series_id=${seriesId}&api_key=${API_KEY}&file_type=json&sort_order=asc`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status} for ${seriesId}`);
            const json = await res.json();
            return json.observations
              .filter(d => d.value !== '.')
              .map(d => ({ date: d.date, value: parseFloat(d.value) }));
          }

          async function main() {
            const series = {};
            for (const [key, id] of Object.entries(SERIES)) {
              console.log(`Fetching ${key} (${id})...`);
              series[key] = await fetchSeries(id);
              console.log(`  -> ${series[key].length} observations`);
            }

            const output = {
              lastUpdated: new Date().toISOString(),
              series
            };

            const outDir = path.join('public', 'data');
            fs.mkdirSync(outDir, { recursive: true });
            fs.writeFileSync(
              path.join(outDir, 'fred.json'),
              JSON.stringify(output)
            );
            console.log('public/data/fred.json を更新しました');
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/fred.json
          git diff --cached --quiet && echo "変更なし" || (git commit -m "chore: FREDデータを更新" && git push)

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        run: |
          git remote set-url origin https://git:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          npx gh-pages -d dist -u "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
